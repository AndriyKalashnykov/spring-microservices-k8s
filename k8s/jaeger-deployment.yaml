apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: jaeger
        # Jaeger v2 (built on the OpenTelemetry Collector). Single binary
        # replaces the retired v1 all-in-one image; in-memory storage +
        # OTLP receivers + query UI topology is equivalent, but config
        # moved from env vars to a YAML file (see jaeger-config.yaml).
        # renovate: datasource=docker depName=jaegertracing/jaeger
        image: jaegertracing/jaeger:2.17.0
        args:
          - --config=file:/etc/jaeger/config.yaml
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        ports:
        - name: ui
          containerPort: 16686
        - name: otlp-http
          containerPort: 4318
        - name: otlp-grpc
          containerPort: 4317
        - name: health
          containerPort: 13133
        volumeMounts:
        - name: config
          mountPath: /etc/jaeger
          readOnly: true
        resources:
          requests:
            cpu: "0.1"
            memory: 256Mi
          limits:
            cpu: "1.0"
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /status
            port: 13133
          initialDelaySeconds: 5
          timeoutSeconds: 2
          periodSeconds: 10
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /status
            port: 13133
          initialDelaySeconds: 15
          timeoutSeconds: 2
          periodSeconds: 20
          failureThreshold: 5
      volumes:
      - name: config
        configMap:
          name: jaeger-config
      serviceAccountName: api-service-account
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  labels:
    app: jaeger
spec:
  type: LoadBalancer
  ports:
  - name: ui
    port: 16686
    targetPort: 16686
    protocol: TCP
  - name: otlp-http
    port: 4318
    targetPort: 4318
    protocol: TCP
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
    protocol: TCP
  selector:
    app: jaeger
