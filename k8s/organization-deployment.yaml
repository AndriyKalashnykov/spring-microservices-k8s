apiVersion: apps/v1
kind: Deployment
metadata:
  name: organization
  labels:
    app: organization
spec:
  replicas: 1
  selector:
    matchLabels:
      app: organization
  template:
    metadata:
      labels:
        app: organization
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: organization
        image: organization:local
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        ports:
          - containerPort: 8080
        env:
          - name: SPRING_MONGODB_HOST
            valueFrom:
              configMapKeyRef:
                name: organization
                key: spring.data.mongodb.host
          - name: SPRING_MONGODB_DATABASE
            valueFrom:
              configMapKeyRef:
                name: organization
                key: spring.data.mongodb.database
          - name: SPRING_MONGODB_USERNAME
            valueFrom:
              secretKeyRef:
                name: organization
                key: spring.data.mongodb.username
          - name: SPRING_MONGODB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: organization
                key: spring.data.mongodb.password
          # OTLP tracing — explicit env-var bindings because spring-cloud-kubernetes-config
          # 5.0.1's ConfigData resolver isn't picked up under Spring Boot 4.0 (legacy
          # spring.factories registration only). Revisit when SCK ships SB-4 support.
          - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
            valueFrom:
              configMapKeyRef:
                name: organization
                key: management.tracing.sampling.probability
          - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT
            valueFrom:
              configMapKeyRef:
                name: organization
                key: management.otlp.tracing.endpoint
          # Disable OTLP metrics + logs export — tracing is the only OTLP
          # path this project uses. See employee-deployment.yaml for the
          # rationale.
          - name: MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED
            value: "false"
          - name: MANAGEMENT_LOGGING_EXPORT_OTLP_ENABLED
            value: "false"
        resources:
          requests:
            cpu: "0.2"
            memory: 1Gi
          limits:
            cpu: "1.0"
            memory: 1Gi
        startupProbe:
          httpGet:
            port: 8080
            path: /actuator/health
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 20
        readinessProbe:
          httpGet:
            port: 8080
            path: /actuator/health
          initialDelaySeconds: 0
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            port: 8080
            path: /actuator/info
          initialDelaySeconds: 0
          timeoutSeconds: 5
          periodSeconds: 20
          failureThreshold: 5
        volumeMounts:
          - name: tmp
            mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      serviceAccountName: api-service-account
---
apiVersion: v1
kind: Service
metadata:
  name: organization
  labels:
    app: organization
spec:
  ports:
  - port: 8080
    protocol: TCP
  selector:
    app: organization
  type: ClusterIP