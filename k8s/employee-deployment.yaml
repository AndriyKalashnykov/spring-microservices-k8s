apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee
  labels:
    app: employee
spec:
  replicas: 1
  selector:
    matchLabels:
      app: employee
  template:
    metadata:
      labels:
        app: employee
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: employee
          image: employee:local
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_MONGODB_HOST
              valueFrom:
                configMapKeyRef:
                  name: employee
                  key: spring.data.mongodb.host
            - name: SPRING_MONGODB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: employee
                  key: spring.data.mongodb.database
            - name: SPRING_MONGODB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: employee
                  key: spring.data.mongodb.username
            - name: SPRING_MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: employee
                  key: spring.data.mongodb.password
            # OTLP tracing — explicit env-var bindings because spring-cloud-kubernetes-config
            # 5.0.1's ConfigData resolver isn't picked up under Spring Boot 4.0 (legacy
            # spring.factories registration only). Revisit when SCK ships SB-4 support.
            - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
              valueFrom:
                configMapKeyRef:
                  name: employee
                  key: management.tracing.sampling.probability
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: employee
                  key: management.opentelemetry.tracing.export.otlp.endpoint
            # spring-boot-starter-opentelemetry brings in OTLP exporters for
            # tracing AND metrics AND logging. Tracing is the only one this
            # project routes to Jaeger; metrics flow to Prometheus via the
            # micrometer-registry-prometheus actuator endpoint, logs stay in
            # stdout/json. Without these disables, OtlpMetricsExportAutoConfiguration
            # tries to create a registry with no endpoint URL → NPE → context
            # fails → app never reaches /actuator/health → rollout times out.
            - name: MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED
              value: "false"
            - name: MANAGEMENT_LOGGING_EXPORT_OTLP_ENABLED
              value: "false"
          resources:
            requests:
              cpu: "0.2"
              memory: 1Gi
            limits:
              cpu: "1.0"
              memory: 1Gi
          startupProbe:
            httpGet:
              port: 8080
              path: /actuator/health
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 20
          readinessProbe:
            httpGet:
              port: 8080
              path: /actuator/health
            initialDelaySeconds: 0
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              port: 8080
              path: /actuator/info
            initialDelaySeconds: 0
            timeoutSeconds: 5
            periodSeconds: 20
            failureThreshold: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      serviceAccountName: api-service-account
---
apiVersion: v1
kind: Service
metadata:
  name: employee
  labels:
    app: employee
spec:
  ports:
    - port: 8080
      protocol: TCP
  selector:
    app: employee
  type: ClusterIP