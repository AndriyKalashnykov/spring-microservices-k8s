apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-config
  labels:
    app: jaeger
data:
  # Jaeger v2 is built on the OpenTelemetry Collector; configuration is a
  # standard otelcol YAML. This minimal shape matches the "all-in-one"
  # topology of the retired v1 image: in-memory trace storage, OTLP
  # receivers (gRPC 4317, HTTP 4318), and the built-in query UI on :16686.
  # Reference: https://github.com/jaegertracing/jaeger/blob/v2.17.0/cmd/jaeger/config.yaml
  config.yaml: |
    service:
      extensions: [jaeger_storage, jaeger_query, healthcheckv2]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [jaeger_storage_exporter]
      telemetry:
        logs:
          level: info

    extensions:
      healthcheckv2:
        use_v2: true
        http:
          endpoint: 0.0.0.0:13133

      jaeger_query:
        storage:
          traces: memstore
        http:
          endpoint: 0.0.0.0:16686
        grpc:
          endpoint: 0.0.0.0:16685

      jaeger_storage:
        backends:
          memstore:
            memory:
              max_traces: 100000

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

    exporters:
      jaeger_storage_exporter:
        trace_storage: memstore
