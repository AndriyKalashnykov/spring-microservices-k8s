# Toolchain pins for local development and CI (portfolio standard: mise).
# CI uses jdx/mise-action to install everything declared here in one step.
# Renovate tracks the pins below via inline comments.

[tools]
# Java major — mise resolves to the latest Temurin patch in this line.
# Kept in sync with .java-version (source of truth for CI setup too).
java = "25"

# renovate: datasource=github-tags depName=apache/maven extractVersion=^maven-(?<version>.*)$
maven = "3.9.16"

# Node major — kept in sync with .nvmrc. Used by renovate-validate only.
# Pinned to 24: renovate@latest requires node ^24.11.0.
node = "24"

# renovate: datasource=github-releases depName=kubernetes-sigs/kind extractVersion=^v(?<version>.*)$
kind = "0.32.0"

# kubectl — pinned for reproducibility (was previously the developer's system
# kubectl, an unguarded version). LOCKED to the cluster node's minor line
# (kindest/node v1.35.5 -> kubectl 1.35.x) for an exact apiserver match (0 skew).
# Renovate is constrained to 1.35.x in renovate.json; this bumps DELIBERATELY with
# the cluster (kind CLI + kindest/node) rather than racing ahead. The lock matters
# because the e2e job's paths-filter excludes .mise.toml, so a kubectl-only bump
# never runs e2e -> CI cannot catch kubectl<->cluster skew drift; the constraint is
# the guard, not CI.
# renovate: datasource=github-releases depName=kubernetes/kubernetes extractVersion=^v(?<version>.*)$
kubectl = "1.35.6"

# renovate: datasource=github-releases depName=nektos/act extractVersion=^v(?<version>.*)$
act = "0.2.89"

# renovate: datasource=github-releases depName=hadolint/hadolint extractVersion=^v(?<version>.*)$
hadolint = "2.14.0"

# renovate: datasource=github-releases depName=zricethezav/gitleaks extractVersion=^v(?<version>.*)$
gitleaks = "8.30.1"

# renovate: datasource=github-releases depName=aquasecurity/trivy extractVersion=^v(?<version>.*)$
trivy = "0.71.2"

# renovate: datasource=github-releases depName=rhysd/actionlint extractVersion=^v(?<version>.*)$
actionlint = "1.7.12"

# renovate: datasource=github-releases depName=koalaman/shellcheck extractVersion=^v(?<version>.*)$
shellcheck = "0.11.0"
