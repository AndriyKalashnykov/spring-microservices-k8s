spring:
  config:
    import: ""
  cloud:
    kubernetes:
      enabled: false
      config:
        enabled: false
      discovery:
        enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Disable OTLP exporters in tests — no collector to reach.
management:
  otlp:
    tracing:
      export:
        enabled: false
    metrics:
      export:
        enabled: false
