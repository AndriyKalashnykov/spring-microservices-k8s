name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  # Trigger-level paths filtering is intentionally NOT used: combined with the
  # required `ci-pass` aggregator under Repository Rulesets, doc-only PRs would
  # never spawn a workflow run, `ci-pass` would never report, and merge would
  # be blocked indefinitely (admin override is also rejected by Rulesets).
  # Instead, the `changes` job below detects what changed and gates heavy jobs
  # via `needs: [changes]` + `if: needs.changes.outputs.code == 'true'`. The
  # ci-pass aggregator still runs on doc-only PRs (its `if: always()` ensures
  # the Rulesets gate is satisfied).
  pull_request:
  # NO `schedule:` — removed 2026-07-20. It existed solely for the weekly NVD rescan,
  # and `cve-check` was its ONLY consumer, so every Monday it ran the whole pipeline
  # (changes -> static-check -> test -> integration-test -> build -> e2e, ~20 billed
  # minutes) to reach one job that is (a) advisory by design, (b) broken upstream
  # since 2026-04-15 (the NVD nanosecond-timestamp parse bug, backlog #1c) and so
  # producing nothing, and (c) timing out — the 2026-07-20 run burned 45m and
  # reported `cancelled`, reddening an otherwise fully-green master.
  #
  # What this gives up: automatic detection of a new CVE landing on UNCHANGED
  # dependencies between releases. That is largely covered by `trivy-fs` (in
  # `static-check`), which blocks on CRITICAL/HIGH on every push against a
  # continuously-updated Trivy DB — and this repo pushes often (Renovate). The
  # residual gap is a quiet period with no pushes; `workflow_dispatch` covers an
  # ad-hoc rescan, and a tag runs the full gate. See CLAUDE.md backlog #14.
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  # Required by `dorny/paths-filter` on `pull_request` events to read changed
  # files via the GitHub API (push events use git diff and don't need it).
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detects which classes of files changed so heavy jobs can be skipped on
  # doc-only PRs. Required because trigger-level `paths-ignore` would deadlock
  # the `ci-pass` aggregator under Repository Rulesets — see the `on:` comment.
  # Always runs (no `needs`) so that downstream `if:` expressions can read its
  # outputs even when no code changed.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.outputs.outputs.code }}
      e2e: ${{ steps.outputs.outputs.e2e }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Skipped under local act runs: act's default event payload lacks both
      # `event.before` (push diff base) and `event.repository.default_branch`,
      # both of which dorny/paths-filter needs to auto-detect a base ref. Real
      # GitHub Actions populates these on push/pull_request/schedule events.
      - id: filter
        if: vars.ACT != 'true'
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          # `code` fires on anything that isn't a doc / config-only change.
          # `e2e` is a stricter subset — only KinD-relevant changes warrant
          # the 10–15 min e2e job.
          # CLAUDE.md is re-included so its edits go through the full gate.
          filters: |
            code:
              - '!(**.md|docs/**|specs/**|LICENSE|.gitignore|.claudeignore|.claude/**|benchmarks/**|**.png|**.jpg|**.gif|**.svg)'
              - 'CLAUDE.md'
              # PlantUML diagram sources are rendered to committed PNGs and gated by
              # `diagrams-check` (part of static-check). Re-include them so a .puml-only
              # change runs the drift gate instead of skipping it (which would let stale
              # committed PNGs merge). docs/** is negated above; this restores just the sources.
              - 'docs/diagrams/**/*.puml'
            e2e:
              - 'k8s/**'
              - 'pom.xml'
              - '**/pom.xml'
              - 'Makefile'
              - '.github/workflows/ci.yml'
              - 'e2e/**'
              - '**/Dockerfile'
              - '**/src/**'

      # Final outputs:
      #   - under act, force `code`/`e2e` true so the full pipeline runs
      #     locally (act users want full exercise, not selective skipping);
      #   - on tag pushes, force them true too — a `v*` tag at master's HEAD
      #     yields an empty paths-filter diff, which would skip `cve-check`
      #     and cascade-skip the release `docker` job (green run, zero images
      #     published). A tag is a release and MUST run every job.
      # Otherwise propagate the dorny/paths-filter result.
      - id: outputs
        run: |
          if [ "${{ vars.ACT }}" = "true" ] || [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=${{ steps.filter.outputs.code }}" >> "$GITHUB_OUTPUT"
            echo "e2e=${{ steps.filter.outputs.e2e }}" >> "$GITHUB_OUTPUT"
          fi

  static-check:
    needs: [changes]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      # NO Maven cache here, deliberately. This job runs no Maven: `static-check`'s
      # trivy-fs is now secret+misconfig only (dependency CVEs are tag-time, in
      # image-scan), so nothing in this job reads ~/.m2. Restoring it would only
      # re-create the hazard it used to have — being the FIRST job to seal the
      # `maven-<pomhash>` key with a pom-stale repository that every later job inherits.
      # `build` runs Maven for real and owns the cache.

      - name: Static check
        run: make static-check

  test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Cache Maven dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Test with coverage
        run: make coverage-generate

      - name: Verify coverage threshold
        run: make coverage-check

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        continue-on-error: true
        with:
          name: coverage-report
          path: '**/target/site/jacoco/'
          retention-days: 14

  integration-test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Cache Maven dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Integration test
        run: make integration-test

      - name: Upload Failsafe reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        continue-on-error: true
        with:
          name: failsafe-reports
          path: '**/target/failsafe-reports/'
          retention-days: 14

  build:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Cache Maven dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Build
        run: make build

      # Upload on every push so the image-scan job (gates 1-3 on every push)
      # and e2e job can reuse the JARs instead of rebuilding with Maven.
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        continue-on-error: true
        with:
          name: service-jars
          path: |
            employee-service/target/*.jar
            department-service/target/*.jar
            organization-service/target/*.jar
            gateway-service/target/*.jar
          retention-days: 1

  cve-check:
    needs: [changes, static-check]
    # Runs on:
    #   - TAG pushes only                 (release-time gate — the docker job
    #     depends on it). NOT on plain master pushes: the OWASP NVD scan is slow
    #     (~minutes, downloads the NVD feed). ALL dependency-CVE scanning is
    #     tag-time only (owner decision 2026-07-20, CLAUDE.md #15) — the blocking
    #     dependency+OS-package gate is the `image-scan` job, which scans the built
    #     image (`trivy image`, CRITICAL/HIGH, exit 1) and which `docker` needs.
    #     `trivy-fs` on the per-push path is secret+misconfig ONLY.
    #   - workflow_dispatch               (ad-hoc rescan after a new CVE drop)
    # The weekly `schedule` trigger was REMOVED 2026-07-20 (see the `on:` block).
    # This job is therefore TAG-ONLY in practice, which raises the stakes on the
    # step timeout below: `docker` needs this job, so a cancelled cve-check now
    # blocks a RELEASE rather than merely reddening a scheduled run.
    # Skipped under local act runs because the OWASP NVD download is slow.
    # Also skipped on doc-only changes (changes.outputs.code == 'false').
    if: |
      !failure() && !cancelled() && vars.ACT != 'true' && needs.changes.outputs.code == 'true' && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Compute ISO week for NVD cache rotation
        id: nvdweek
        run: echo "week=$(date -u +%Y-%V)" >> "$GITHUB_OUTPUT"

      # RESTORE here, SAVE conditionally after the scan (see "Save NVD database" below) —
      # a plain actions/cache would persist a HALF-DOWNLOADED DB whenever the scan is cut
      # short, and the weekly key would then serve that truncated DB for the rest of the week.
      - name: Restore NVD database
        id: nvdcache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          # Rotate weekly: the NVD DB grows continuously, so a key tied to pom.xml
          # (rarely changed) would serve a stale DB for weeks. ISO-week key refreshes
          # every Monday; restore-keys falls back to the latest prior week's cache.
          key: nvd-db-${{ steps.nvdweek.outputs.week }}
          restore-keys: nvd-db-

      - name: Create Maven settings for OSS Index
        run: make maven-settings-ossindex

      # TEMPORARY: continue-on-error while upstream ships a fix for NVD's
      # 2026-04-15 9-digit-nanosecond timestamp change. ODC 12.2.0 and 12.2.1
      # fail to parse NVD's `timestamp` field, making `cve-check` red on
      # every run. Upstream tracking: dependency-check/DependencyCheck#8424
      # and jeremylong/open-vulnerability-clients#106. Remove this flag
      # when ODC > 12.2.1 ships with the fix (Renovate bumps the plugin).
      # Coverage is not lost — dependency CVEs are covered by `trivy-fs` inside
      # `static-check` on every push, and by the per-service `image-scan` at tag time.
      #
      # timeout-minutes: 35 is LOAD-BEARING, not decoration. `continue-on-error` absorbs a
      # STEP failure but NOT a JOB timeout: a job that hits its own `timeout-minutes: 45`
      # (above) reports `cancelled`, which continue-on-error cannot convert. Observed
      # 2026-07-20: this step ran 45m16s against the job's cap and cancelled the run.
      # Capping the STEP converts that into a Failed step, which continue-on-error
      # converts to a successful job.
      #
      # Now that the weekly schedule is gone this job is TAG-ONLY, so the failure it
      # prevents is no longer a red scheduled run — it is a BLOCKED RELEASE: `docker`
      # needs this job, and a cancelled need means the images never publish. An
      # advisory scan must not be able to veto a release by being slow.
      #
      # ARITHMETIC: 35 here + the ~5 min the preceding steps take (checkout, mise,
      # NVD cache restore) must stay under the job's 45. Change one, change both.
      - name: Run OWASP dependency check
        id: odc
        continue-on-error: true
        timeout-minutes: 35
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          OSS_INDEX_USER: ${{ secrets.OSS_INDEX_USER }}
          OSS_INDEX_TOKEN: ${{ secrets.OSS_INDEX_TOKEN }}
          MAVEN_OPTS: '--add-modules jdk.incubator.vector'
        run: |
          rc=0
          make cve-check || rc=$?
          # Reached only if the scan RAN TO COMPLETION — including an ordinary failure
          # such as the upstream parse bug above, which still leaves a fully-downloaded
          # NVD DB worth caching. A timeout kills the step before this line, which is
          # precisely what the cache-save gate below keys on. Do NOT gate that save on
          # the step's outcome instead: ODC fails on EVERY run today, so an
          # outcome-based gate would disable NVD caching entirely and make the slow
          # full download permanent.
          echo "completed=true" >> "$GITHUB_OUTPUT"
          exit $rc

      - name: Save NVD database
        # Only when the scan completed (see above) and this week's key is not already
        # stored — actions/cache/save errors on an existing key.
        #
        # continue-on-error: this job is ADVISORY, and `docker` needs it — so without
        # this flag a transient cache-service error (5xx, quota, a two-tags-in-one-week
        # key race) would fail cve-check and BLOCK A RELEASE on a cache write. A cache
        # miss next run is the correct cost of a failed save; a blocked release is not.
        continue-on-error: true
        if: steps.odc.outputs.completed == 'true' && steps.nvdcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-db-${{ steps.nvdweek.outputs.week }}

      # Without this, a permanently-timing-out scan becomes a green job with a yellow
      # step nobody opens. This job is advisory, so nothing else would ever say so.
      - name: Warn when the OWASP scan did not complete
        if: always() && steps.odc.outputs.completed != 'true'
        run: |
          echo "::warning title=OWASP scan incomplete::The OWASP dependency-check step did not run to completion (step cap: 35 min). The NVD DB was NOT cached. If this repeats across weekly runs, cve-check is providing no coverage — see CLAUDE.md backlog #1c."

      - name: Upload CVE report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        continue-on-error: true
        with:
          name: cve-report
          path: '**/target/dependency-check-report.html'
          retention-days: 14

  # Pre-tag Dockerfile validation running gates 1-3 (build + Trivy image scan
  # + Spring Boot smoke test) on EVERY push. Catches base-image CVE regressions
  # and Dockerfile breakages on the commit that introduced them, not on release
  # day. The full tag-gated `docker` job below is a superset (adds multi-arch
  # build + push + cosign) and is the matrix-exception to the consolidated
  # `/ci-workflow` "single docker job" pattern: running the full 4-service
  # multi-arch matrix on every push would be too expensive, so image-scan runs
  # single-arch gates 1-3 on every push and docker runs the full pipeline on
  # tag pushes only.
  image-scan:
    needs: [changes, build]
    # TAG PUSHES ONLY. This job (4-service matrix: docker build + Trivy + Spring Boot
    # smoke test + container-structure-test) was ~50% of every push's billed minutes
    # (~9m55s of ~20m), and its most expensive half was duplicated work: `e2e` already
    # builds all four images and boots them in a real KinD cluster on every push
    # (make e2e -> kind-up -> kind-deploy -> image-build), so "does the image build and
    # does Spring Boot start" is covered per-push regardless.
    #
    # ACCEPTED TRADE (deliberate, recorded in CLAUDE.md #13/#15): the Trivy image scan
    # and the container-structure-test Dockerfile contract now run at RELEASE time
    # rather than on the commit that introduces a regression. There is NO per-push
    # dependency-CVE scan by design (owner decision 2026-07-20) — this `image-scan`
    # job IS the blocking dependency+OS-package gate, at tag time. `trivy-fs` on the
    # per-push path is secret+misconfig only.
    #
    # This is only safe because `docker` now *needs* this job (see below). Before that,
    # the two ran in PARALLEL on a tag and a CRITICAL finding never blocked the push.
    if: >-
      ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true'
      && (startsWith(github.ref, 'refs/tags/') || vars.ACT == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, employee, organization, department]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Try the upload-artifact → download-artifact fast path first. Under
      # `nektos/act` this reliably fails (cross-job artifact storage is not
      # supported) so we fall back to rebuilding the JARs with Maven. The
      # fallback keeps this job exercised by `make ci-run`.
      - name: Download build artifacts
        id: download-jars
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: service-jars

      # Fallback rebuild path: only runs if download-artifact failed (local act runs).
      - if: steps.download-jars.outcome == 'failure'
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Cache Maven dependencies
        if: steps.download-jars.outcome == 'failure'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Build JARs
        if: steps.download-jars.outcome == 'failure'
        run: make build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build image for scan
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./${{ matrix.service }}-service
          file: ./${{ matrix.service }}-service/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ matrix.service }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.service }}:scan
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Smoke test
        run: |
          set -euo pipefail
          SVC='${{ matrix.service }}'
          docker run -d --name="${SVC}-smoke" "${SVC}:scan"
          echo "Waiting up to 90s for Spring Boot to boot..."
          end=$((SECONDS + 90))
          while [ $SECONDS -lt $end ]; do
            if docker logs "${SVC}-smoke" 2>&1 | grep -qE 'Started [A-Z][a-zA-Z]+Application in|Tomcat started on port|Netty started on port'; then
              echo "PASS: ${SVC} container booted Spring Boot successfully"
              docker rm -f "${SVC}-smoke" >/dev/null
              exit 0
            fi
            sleep 3
          done
          echo "FAIL: ${SVC} did not reach Spring Boot start within 90s"
          echo "--- container logs ---"
          docker logs "${SVC}-smoke"
          docker rm -f "${SVC}-smoke" >/dev/null || true
          exit 1

      # Validates the OCI-manifest-level Dockerfile contract (USER non-root,
      # EXPOSE port, WORKDIR, ENTRYPOINT) with container-structure-test.
      # Orthogonal to Trivy (CVE/secret/misconfig) and the smoke test (runtime
      # boot) — catches a USER reset to root, a wrong port, a changed
      # entrypoint. Runs on every push so Dockerfile-contract drift fails the
      # commit that introduced it, not just the release.
      - name: Container structure test
        # Image tag kept in lockstep with CONTAINER_STRUCTURE_TEST_VERSION in the
        # Makefile (both pinned to gcr.io's frozen max v1.16.0 — see that var's
        # comment). Tracked by the `.github/workflows` docker customManager in
        # renovate.json so the literal can't drift silently.
        run: |
          # renovate: datasource=docker depName=gcr.io/gcp-runtimes/container-structure-test extractVersion=^v(?<version>.*)$
          CST_VERSION="1.16.0"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/.container-structure-test.yaml:/test.yaml:ro" \
            "gcr.io/gcp-runtimes/container-structure-test:v${CST_VERSION}" \
            test --image "${{ matrix.service }}:scan" --config /test.yaml

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f "${{ matrix.service }}-smoke" 2>/dev/null || true

  # End-to-end test job (mandatory per /ci-workflow).
  # Runs `make e2e` which cycles: kind-create → kind-setup (MongoDB) →
  # kind-deploy (build+load images) → e2e-test script → kind-destroy.
  # Skipped under local act runs — nested docker-in-docker (KinD cluster +
  # cloud-provider-kind container on the `kind` network) does not work
  # reliably inside act's runner containers. The job is exercised on
  # GitHub Actions runners on every push/tag/PR.
  e2e:
    # Gated on a stricter filter than `code` so e2e runs only on changes that
    # could affect KinD-deployed services (k8s manifests, code, build files,
    # Dockerfiles, the e2e script itself, the CI workflow). Matches skill
    # convention for the "what could break the cluster?" surface.
    if: ${{ !failure() && !cancelled() && vars.ACT != 'true' && needs.changes.outputs.e2e == 'true' }}
    needs: [changes, build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Cache Maven dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Run end-to-end tests
        run: make e2e

  docker:
    # `!failure()` alone is NOT enough to gate a release on a scan: a SKIPPED job
    # satisfies it. `image-scan` happens to always run on a tag today (the `changes`
    # job forces code=true for tags), but that is a guarantee living in a DIFFERENT
    # job's `if:` — one edit there and this publishes unscanned images, silently.
    # Require the blocking prerequisites to have actually SUCCEEDED, per the
    # /ci-workflow rule learned by cutting real tags twice (activemq-ldap 2026-06-30):
    # check the DIRECT need's result explicitly rather than relying on a status
    # function that cannot distinguish "passed" from "never ran".
    #
    # cve-check is deliberately NOT in the success list — it is advisory (every step
    # is continue-on-error) and must never be able to veto a release by being slow or
    # skipped. `!failure()` still blocks it from failing the release for a REAL reason
    # (e.g. `make maven-settings-ossindex`, which has no continue-on-error).
    # `e2e` is in this list for the same reason `image-scan` is. `!failure()` only
    # spans a job's OWN needs, so before this, a FAILING e2e could not stop the push:
    # docker and e2e both merely needed `build`, ran in parallel on a tag, and the
    # image shipped to GHCR + cosign-signed while e2e was still red. That matters more
    # now than it used to — the justification for making image-scan tag-only is that
    # `e2e` builds and boots all four images on every push, so e2e IS the load-bearing
    # image validation, and load-bearing validation that cannot block a release is
    # decoration. (Known, safe-direction caveat: e2e carries `vars.ACT != 'true'`, so
    # a hypothetical act run on a tag self-blocks rather than publishing.)
    if: >-
      ${{ !cancelled() && !failure()
      && needs.build.result == 'success'
      && needs.test.result == 'success'
      && needs.e2e.result == 'success'
      && needs.image-scan.result == 'success'
      && startsWith(github.ref, 'refs/tags/') }}
    # Gate releases on the full pre-push hardening pipeline:
    #   build + test + cve-check + image-scan (Trivy CRITICAL/HIGH + Spring Boot smoke
    #   test + container-structure-test) → push (Pattern A, no in-manifest attestations)
    #   → cosign sign
    #
    # `image-scan` was NOT in this list until 2026-07-20, despite the comment above
    # having claimed the scan gated the push since it was written. Both jobs only
    # needed `build`, so on a tag they ran in PARALLEL: a CRITICAL CVE failed the run
    # AFTER the image had already been pushed to GHCR and cosign-signed. ci-pass went
    # red, the artifact shipped anyway. Listing it here is what makes the gate real —
    # and it is a prerequisite of image-scan being tag-only, since that leaves this as
    # the scan's ONLY run.
    needs: [build, test, cve-check, image-scan, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write       # GHCR push
      id-token: write       # cosign keyless OIDC signing (Sigstore Fulcio)
    strategy:
      matrix:
        service: [gateway, employee, organization, department]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: service-jars

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          # Convention: bare semver on Docker image tags, `v`-prefix on git tags.
          # The `{{version}}` template strips the `v` from git tag `vX.Y.Z`
          # automatically, matching how Docker Hub official images are tagged
          # (mongo:8.0.20, node:24, postgres:17, nginx:1.27, alpine:3.20, etc.).
          # Git tag stays `vX.Y.Z` (Go module / GitHub release convention).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: |
            latest=true

      # ----------------------------------------------------------------
      # GATE 1: Build single-arch image locally for security checks.
      # `load: true` lands the image in the local Docker daemon so the
      # next steps can scan/run it. Multi-arch + attestations cannot be
      # combined with `load: true` per Docker's docs, so we build twice:
      # once locally for gating, then again multi-arch for the push.
      # The second build is ~95% cache-hit from this one (type=gha).
      # ----------------------------------------------------------------
      - name: Build image for scan
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./${{ matrix.service }}-service
          file: ./${{ matrix.service }}-service/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ matrix.service }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------------------------------
      # GATE 2: Trivy image scan — CRITICAL/HIGH blocks the release.
      # Catches CVEs in the base image (eclipse-temurin:25-jre-noble)
      # and any OS packages added during the build that filesystem-only
      # scans (already done in the static-check job) cannot see.
      # `ignore-unfixed: true` skips CVEs with no upstream fix yet —
      # blocking on those creates churn without resolution.
      # ----------------------------------------------------------------
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.service }}:scan
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      # ----------------------------------------------------------------
      # GATE 3: Spring Boot boot-marker smoke test.
      # Spring Boot services need MongoDB to pass /actuator/health, so
      # a health-endpoint smoke test would always fail. Instead, watch
      # the container logs for Spring Boot's standard "started" line.
      # This proves the JAR is well-formed, JVM starts, Spring context
      # boots, and embedded Tomcat begins listening — without needing
      # any external dependencies.
      # ----------------------------------------------------------------
      - name: Smoke test
        run: |
          set -euo pipefail
          SVC='${{ matrix.service }}'
          docker run -d --name="${SVC}-smoke" "${SVC}:scan"
          echo "Waiting up to 90s for Spring Boot to boot..."
          end=$((SECONDS + 90))
          while [ $SECONDS -lt $end ]; do
            if docker logs "${SVC}-smoke" 2>&1 | grep -qE 'Started [A-Z][a-zA-Z]+Application in|Tomcat started on port|Netty started on port'; then
              echo "PASS: ${SVC} container booted Spring Boot successfully"
              docker rm -f "${SVC}-smoke" >/dev/null
              exit 0
            fi
            sleep 3
          done
          echo "FAIL: ${SVC} did not reach Spring Boot start within 90s"
          echo "--- container logs ---"
          docker logs "${SVC}-smoke"
          docker rm -f "${SVC}-smoke" >/dev/null || true
          exit 1

      # ----------------------------------------------------------------
      # All gates passed → publish multi-arch.
      # ----------------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./${{ matrix.service }}-service
          file: ./${{ matrix.service }}-service/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # provenance + sbom set to false (Pattern A). Buildx's in-manifest
          # attestations add per-platform `unknown/unknown` rows to the OCI
          # index that GHCR's web UI renders as if they were real platforms —
          # a confusing cosmetic cost with no upside unless a downstream
          # consumer actually runs `cosign verify-attestation` / `trivy image
          # --sbom-from registry`. Nothing does today, so the attestations
          # were being produced and never read. Cosign keyless signing on the
          # manifest digest below still proves origin. Switch BOTH back to
          # `mode=max` / `true` (Pattern B) the moment a downstream verifier
          # is wired in — the supply-chain attestations are still worth
          # paying for, just not before there is a reader.
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------------------------------
      # Post-push: cosign keyless signing.
      # Signs the manifest digest with Sigstore via OIDC (no long-lived
      # private keys). Consumers verify with:
      #   cosign verify ghcr.io/owner/repo/service:tag \
      #     --certificate-identity-regexp 'https://github\.com/.+' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      # Signing the digest covers all tags pointing to it (one signature
      # per tag in the rekor record for clarity, but they all verify the
      # same manifest).
      # ----------------------------------------------------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          echo "Signing manifest digest ${DIGEST} for tags:"
          echo "${TAGS}"
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  # Branch-protection aggregator. Single required status check — jobs can be
  # added or renamed without touching Settings. Skipped jobs (cve-check under
  # act / on non-push branches; e2e under act; docker on non-tag pushes) do NOT
  # count as failure — only `failure` results trip the gate.
  ci-pass:
    if: always()
    needs: [changes, static-check, test, integration-test, build, cve-check, image-scan, e2e, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs were cancelled"
            exit 1
          fi
          echo "All required jobs passed or were skipped."
