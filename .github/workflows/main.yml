name: ci

on:
  push:
    branches: [master]
    tags: ['v*']
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  pull_request:
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ensure Maven is installed
        run: make deps-maven

      - name: Static check
        run: make static-check

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'fs'
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  tests:
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ensure Maven is installed
        run: make deps-maven

      - name: Test with coverage
        run: make coverage-generate

      - name: Verify coverage threshold
        run: make coverage-check
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        continue-on-error: true
        with:
          name: coverage-report
          path: |
            employee-service/target/site/jacoco/
            department-service/target/site/jacoco/
            organization-service/target/site/jacoco/
          retention-days: 14

  builds:
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ensure Maven is installed
        run: make deps-maven

      - name: Build
        run: make build

  cve-check:
    needs: [lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ensure Maven is installed
        run: make deps-maven

      - name: OWASP dependency check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          MAVEN_OPTS: '--add-modules jdk.incubator.vector'
        run: make cve-check

      - name: Upload CVE report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        continue-on-error: true
        with:
          name: cve-report
          path: '**/target/dependency-check-report.html'
          retention-days: 14

  docker:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [builds, tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JARs
        run: make build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata - gateway
        id: meta-gateway
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/gateway-debug
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push - gateway
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ./gateway-service
          file: ./gateway-service/Dockerfile.debug
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-gateway.outputs.tags }}
          labels: ${{ steps.meta-gateway.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata - employee
        id: meta-employee
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/employee-debug
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push - employee
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ./employee-service
          file: ./employee-service/Dockerfile.debug
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-employee.outputs.tags }}
          labels: ${{ steps.meta-employee.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata - organization
        id: meta-organization
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/organization-debug
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push - organization
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ./organization-service
          file: ./organization-service/Dockerfile.debug
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-organization.outputs.tags }}
          labels: ${{ steps.meta-organization.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata - department
        id: meta-department
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/department-debug
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push - department
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ./department-service
          file: ./department-service/Dockerfile.debug
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-department.outputs.tags }}
          labels: ${{ steps.meta-department.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
